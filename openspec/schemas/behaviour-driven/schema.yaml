name: behaviour-driven
version: 1
description: Behaviour-driven OpenSpec workflow - proposal -> Gherkin-style specs -> feature files -> acceptance tests -> tasks
artifacts:
  - id: proposal
    generates: proposal.md
    description: Initial proposal document outlining the change
    template: proposal.md
    instruction: >
      Create the proposal document that establishes WHY this change is needed.


      Sections:

      - **Why**: 1-2 sentences on the problem or opportunity. What problem does
      this solve? Why now?

      - **What Changes**: Bullet list of changes. Be specific about new
      capabilities, modifications, or removals. Mark breaking changes with
      **BREAKING**.

      - **Capabilities**: Identify which behaviour specs will be created or modified:
        - **New Capabilities**: List capabilities being introduced. Each becomes a new `specs/<name>/spec.md`. Use kebab-case names (e.g., `user-auth`, `data-export`).
        - **Modified Capabilities**: List existing capabilities whose behaviour is changing. Only include if spec-level behaviour changes, not just implementation details. Each needs an OpenSpec Markdown delta file at `specs/<name>/spec.md`. Check `openspec/specs/` for existing spec names. Leave empty if no behaviour changes.
      - **Impact**: Affected code, APIs, dependencies, or systems.


      IMPORTANT: The Capabilities section is critical. It creates the link
      between proposal and specs phases. Research existing specs before filling
      this in. Each capability listed here will need a corresponding spec file.


      Keep it concise (1-2 pages). Focus on the "why" not the "how" -
      implementation details belong in design.md.


      This is the foundation - specs, design, and tasks all build on this.
    requires: []
  - id: specs
    generates: specs/**/*.md
    description: OpenSpec Markdown specs that can be distilled into feature files and acceptance tests
    template: spec.md
    instruction: >
      Create OpenSpec Markdown spec files that define WHAT the system should do.
      The Markdown structure is the OpenSpec merge wrapper; the requirement and
      scenario content inside that wrapper should be written in Gherkin style
      so it can be translated into downstream `features/*.feature` files and
      `acceptance-tests/` step definitions.


      Create one spec file per capability listed in the proposal's Capabilities
      section.

      - New capabilities: use the exact kebab-case name from the proposal
      (specs/<capability>/spec.md).

      - Modified capabilities: use the existing spec folder name from
      openspec/specs/<capability>/ when creating the delta spec at
      specs/<capability>/spec.md.


      Delta operations (use ## headers exactly so OpenSpec archive can merge):

      - **ADDED Requirements**: New behaviour capabilities.

      - **MODIFIED Requirements**: Changed behaviour - MUST include the full
      updated requirement content, not a partial diff.

      - **REMOVED Requirements**: Deprecated behaviours - MUST include
      **Reason** and **Migration**.

      - **RENAMED Requirements**: Name changes only - use FROM:/TO: format.


      OpenSpec wrapper requirements:

      - Each requirement MUST use `### Requirement: <name>`.

      - Each scenario MUST use `#### Scenario: <name>`. This exact four-hash
      heading is required for OpenSpec validation and archive.

      - Every requirement MUST have at least one scenario.


      Gherkin-style content requirements:

      - Treat each requirement as the feature or business rule being specified.
      You may include `Feature:` or `Rule:` prose in the requirement body when
      it clarifies the behaviour.

      - Each scenario MUST describe behaviour with `GIVEN`, `WHEN`, and `THEN`
      steps. Use `AND` or `BUT` for follow-on steps.

      - Write observable outcomes in `THEN` steps. Avoid implementation details
        such as database table names, private methods, or UI selectors unless
        they are part of the domain specification.

      - Keep the behaviour description precise enough that downstream task
        generation can derive or update a root-level `features/*.feature` file
        and a root-level `acceptance-tests/` Node project.


      MODIFIED requirements workflow:

      1. Locate the existing requirement in openspec/specs/<capability>/spec.md.

      2. Copy the ENTIRE requirement block (from `### Requirement:` through all
      scenarios).

      3. Paste under `## MODIFIED Requirements` and edit it so the copied block
      represents the full desired behaviour after the change.

      4. Ensure header text matches exactly (whitespace-insensitive).


      Common pitfall: Using MODIFIED with partial content loses detail at
      archive time. If adding new concerns without changing existing behaviour,
      use ADDED instead.


      Use the spec template shape exactly. Each scenario must remain mergeable
      by OpenSpec archive and precise enough to extract into feature files and
      acceptance tests.
    requires:
      - proposal
  - id: design
    generates: design.md
    description: Technical design document with implementation details
    template: design.md
    instruction: >
      Create the design document that explains HOW to implement the change.


      When to include design.md (create only if any apply):

      - Cross-cutting change (multiple services/modules) or new architectural
      pattern

      - New external dependency or significant data model changes

      - Security, performance, or migration complexity

      - Ambiguity that benefits from technical decisions before coding


      Sections:

      - **Context**: Background, current state, constraints, stakeholders

      - **Goals / Non-Goals**: What this design achieves and explicitly excludes

      - **Decisions**: Key technical choices with rationale (why X over Y?).
      Include alternatives considered for each decision.

      - **Risks / Trade-offs**: Known limitations, things that could go wrong.
      Format: [Risk] -> Mitigation

      - **Migration Plan**: Steps to deploy, rollback strategy (if applicable)

      - **Open Questions**: Outstanding decisions or unknowns to resolve


      Focus on architecture and approach, not line-by-line implementation.

      Reference the proposal for motivation and specs for requirements.


      Good design docs explain the "why" behind technical decisions.
    requires:
      - proposal
  - id: tasks
    generates: tasks.md
    description: Implementation checklist that starts from feature extraction and ends with passing acceptance tests
    template: tasks.md
    instruction: >
      Create the task list that breaks down the implementation work.


      Treat the template as a required gate contract. Preserve the section
      order, commit checkpoints, and `- [ ]` checkbox format, then replace
      placeholders with change-specific feature files, acceptance-test files,
      Cucumber.js configuration, reports, attempt limits, and implementation
      subsystems. The apply phase parses checkbox format to track progress.


      Checklist requirements:

      - Group related tasks under ## numbered headings.

      - Each task MUST be a checkbox: `- [ ] X.Y Task description`.

      - Tasks should be small enough to complete in one session.

      - Order tasks by dependency (what must be done first?).

      Required BDD gates:

      - Extract or update root-level `features/*.feature` files from the
        OpenSpec Markdown specs before writing acceptance-test code. Map
        each capability to an existing `features/*.feature` file or a new
        file; do not create a duplicate feature file. When updating an
        existing file, merge semantically: preserve unrelated scenarios,
        edit matching scenarios in place, add new scenarios for new
        behaviour, and delete scenarios the spec delta explicitly removes.
        When a scenario is deleted, remove the corresponding step
        definitions, fixtures, and helpers from `acceptance-tests/` in
        sync. Reject duplicate feature files or duplicate scenarios before
        the extraction commit.

      - Configure a root-level `acceptance-tests/` Node project that uses
        Cucumber.js, ignores `acceptance-tests/node_modules/` in git, defines
        scripts for `gherkin-lint`, JavaScript linting, and acceptance runs,
        and writes an HTML report for every acceptance run.

      - Run `gherkin-lint` once from `acceptance-tests/` against the extracted
        root feature files. Require zero lint errors before committing the
        feature extraction gate.

      - Add step definitions, fixtures, helpers, and environment setup after
        the feature gate commit. The failing acceptance gate MUST cover every
        in-scope business scenario from the OpenSpec delta before any
        application implementation begins. Run Cucumber.js with HTML report
        output and confirm the suite fails for the intended unimplemented
        application behaviour, not missing steps, bad configuration, feature
        syntax, or test plumbing. Commit this failing acceptance gate before
        implementing application code.

      - Start implementation only after the failing acceptance-test setup has
        been committed. Implementation tasks MUST be granular and name each
        affected subsystem, such as API handlers, domain services, persistence,
        CLI/UI surfaces, adapters, configuration, docs, fixtures, and test
        helpers when those subsystems are in scope. Structure implementation
        as scenario slices: each slice identifies the business scenario or
        scenario group it intends to turn green, then runs the full
        Cucumber.js acceptance suite. All previously implemented scenarios
        must remain green; the only acceptable red scenarios are those
        listed as not-yet-implemented in the current task checklist for
        that slice.

      - Before the acceptance-fix loop, ask how many attempts to allow; default
        to 3 when no limit is provided. Expand the recorded limit into one
        checkbox per attempt, labeled `Acceptance attempt X/<limit>`, with the
        HTML report path. Run Cucumber.js until it passes or the recorded limit
        is exhausted. After failed attempts, fix implementation code without
        weakening committed feature files or acceptance tests. If an early
        attempt passes, replace remaining unrun attempts with a completed "not
        needed" checkpoint that records the passing attempt. If the last
        allowed attempt fails, stop with an error saying there are still errors
        and include the HTML report path.

      - Commit checkpoints are mandatory after feature extraction, after
        failing acceptance-test setup, and after passing implementation. If a
        required commit cannot be made, the task list MUST direct the
        contributor to pause before crossing the gate.

      - If accepted behaviour is wrong, update the OpenSpec artifacts
        deliberately and review the test change; never weaken committed
        feature files or acceptance tests just to make implementation pass.

      - If implementation changes behaviour specs, include
        `openspec validate <change> --type change --strict` before archive.
    requires:
      - specs
      - design
apply:
  requires:
    - tasks
  tracks: tasks.md
  instruction: |
    Follow tasks.md in gate order and mark checkboxes complete as work finishes.
    Enforce the feature-extraction, failing-acceptance, implementation, and
    verification gates exactly as written. Stop before crossing any gate if its
    lint, test, validation, or commit checkpoint fails.

    Do not start acceptance-test code before the committed feature extraction
    gate. Do not start application implementation before the committed failing
    Cucumber.js acceptance gate. Implement in scenario slices as recorded in
    tasks.md: each slice targets one business scenario or scenario group.
    After each slice, run the full Cucumber.js acceptance suite. Only the
    scenarios listed as not-yet-implemented in the current checklist may be
    red; any regression in previously passing scenarios requires a fix before
    proceeding. During implementation, use the attempt limit recorded in
    tasks.md; if none is recorded, default to 3 and state that default before
    running the loop. Each attempt must run Cucumber.js with HTML report
    output. After a failed attempt, fix implementation code and retry until
    the suite passes or the limit is exhausted. If the final allowed attempt
    fails, stop with an error saying there are still errors and include the
    HTML report path.

    Treat features/ and acceptance-tests/ as off limits during ordinary
    implementation. Step definitions, fixtures, helpers, or feature text are
    not changed merely to make failing scenarios pass. Any necessary correction
    to accepted behaviour requires updating the OpenSpec change artifacts
    before modifying committed feature or acceptance-test files.
