name: behaviour-driven
version: 1
description: Behaviour-driven OpenSpec workflow - proposal → Gherkin specs → design → tasks
artifacts:
  - id: proposal
    generates: proposal.md
    description: Initial proposal document outlining the change
    template: proposal.md
    instruction: >
      Create the proposal document that establishes WHY this change is needed.


      Sections:

      - **Why**: 1-2 sentences on the problem or opportunity. What problem does
      this solve? Why now?

      - **What Changes**: Bullet list of changes. Be specific about new
      capabilities, modifications, or removals. Mark breaking changes with
      **BREAKING**.

      - **Capabilities**: Identify which behaviour specs will be created or modified:
        - **New Capabilities**: List capabilities being introduced. Each becomes a new `specs/<name>/spec.feature`. Use kebab-case names (e.g., `user-auth`, `data-export`).
        - **Modified Capabilities**: List existing capabilities whose behaviour is changing. Only include if spec-level behaviour changes (not just implementation details). Each needs a Gherkin feature file. Check `openspec/specs/` for existing spec names. Leave empty if no behaviour changes.
      - **Impact**: Affected code, APIs, dependencies, or systems.


      IMPORTANT: The Capabilities section is critical. It creates the contract
      between

      proposal and specs phases. Research existing specs before filling this in.

      Each capability listed here will need a corresponding spec file.


      Keep it concise (1-2 pages). Focus on the "why" not the "how" -

      implementation details belong in design.md.


      This is the foundation - specs, design, and tasks all build on this.
    requires: []
  - id: specs
    generates: specs/**/*.feature
    description: Detailed Gherkin behaviour specifications for the change
    template: spec.feature
    instruction: >
      Create Gherkin feature files that define WHAT the system should do.


      Create one feature file per capability listed in the proposal's Capabilities
      section.

      - New capabilities: use the exact kebab-case name from the proposal
      (specs/<capability>/spec.feature).

      - Modified capabilities: use the existing spec folder name from
      openspec/specs/<capability>/ when creating the feature file at
      specs/<capability>/spec.feature.


      Linting requirement:

      - Before editing any behaviour spec, run `npx gherkin-lint
      -c openspec/schemas/behaviour-driven/.gherkin-lintrc
      "openspec/specs/**/*.feature" "openspec/changes/<change>/specs/**/*.feature"`
      from the target repository root when matching files exist. If this schema
      is installed outside the project, pass the installed schema config path to
      `-c`.

      - After every change to a behaviour spec, run the same command again and
      fix all lint failures before continuing.

      - If there are no existing feature files before authoring the first spec,
      create the new `spec.feature` file first and then run gherkin-lint before
      moving on to design or tasks.


      Gherkin format requirements:

      - Each file MUST contain exactly one `Feature:` and MUST be valid Gherkin.

      - Use `Rule:` to group scenarios by business rule or requirement when a
      capability has multiple distinct behaviours.

      - Use `Scenario:` for concrete examples. `Example:` is allowed as the
      Gherkin synonym, but prefer `Scenario:` for consistency.

      - Each scenario MUST describe behaviour with `Given`, `When`, and `Then`
      steps. Use `And` or `But` for follow-on steps.

      - Write observable outcomes in `Then` steps. Avoid implementation details
      such as database table names, private methods, or UI selectors unless
      they are part of the domain contract.

      - Use two-space indentation for nested Gherkin content.


      Modified behaviour workflow:

      1. Locate the existing capability feature file, usually
      openspec/specs/<capability>/spec.feature.

      2. Copy the relevant existing Feature, Rule, or Scenario content into the
      change feature file.

      3. Edit the copied Gherkin so the feature file represents the full desired
      behaviour after the change.

      4. Run gherkin-lint after the edit and resolve every issue.


      Do not use Markdown delta headers such as `## ADDED Requirements`,
      `## MODIFIED Requirements`, or `### Requirement:` inside `.feature` files;
      they are not valid Gherkin.


      Example:

      ```

      Feature: User data export

        Rule: Users can export their own data
          Scenario: Successful CSV export
            Given a user has saved data
            When the user exports their data as CSV
            Then the system provides a CSV file containing the user's data

      ```


      Specs should be executable documentation - each scenario is a potential
      acceptance test.
    requires:
      - proposal
  - id: design
    generates: design.md
    description: Technical design document with implementation details
    template: design.md
    instruction: >
      Create the design document that explains HOW to implement the change.


      When to include design.md (create only if any apply):

      - Cross-cutting change (multiple services/modules) or new architectural
      pattern

      - New external dependency or significant data model changes

      - Security, performance, or migration complexity

      - Ambiguity that benefits from technical decisions before coding


      Sections:

      - **Context**: Background, current state, constraints, stakeholders

      - **Goals / Non-Goals**: What this design achieves and explicitly excludes

      - **Decisions**: Key technical choices with rationale (why X over Y?).
      Include alternatives considered for each decision.

      - **Risks / Trade-offs**: Known limitations, things that could go wrong.
      Format: [Risk] → Mitigation

      - **Migration Plan**: Steps to deploy, rollback strategy (if applicable)

      - **Open Questions**: Outstanding decisions or unknowns to resolve


      Focus on architecture and approach, not line-by-line implementation.

      Reference the proposal for motivation and specs for requirements.


      Good design docs explain the "why" behind technical decisions.
    requires:
      - proposal
  - id: tasks
    generates: tasks.md
    description: Implementation checklist with trackable tasks
    template: tasks.md
    instruction: >
      Create the task list that breaks down the implementation work.


      **IMPORTANT: Follow the template below exactly.** The apply phase parses

      checkbox format to track progress. Tasks not using `- [ ]` won't be
      tracked.


      Guidelines:

      - Group related tasks under ## numbered headings

      - Each task MUST be a checkbox: `- [ ] X.Y Task description`

      - Tasks should be small enough to complete in one session

      - Order tasks by dependency (what must be done first?)

      - If implementation changes behaviour specs, include tasks to run
      gherkin-lint before and after editing `specs/**/*.feature`.


      Example:

      ```

      ## 1. Setup


      - [ ] 1.1 Create new module structure

      - [ ] 1.2 Add dependencies to package.json


      ## 2. Core Implementation


      - [ ] 2.1 Implement data export function

      - [ ] 2.2 Add CSV formatting utilities

      ```


      Reference specs for what needs to be built, design for how to build it.

      Each task should be verifiable - you know when it's done.
    requires:
      - specs
      - design
apply:
  requires:
    - tasks
  tracks: tasks.md
  instruction: |
    Read context files, work through pending tasks, mark complete as you go.
    Pause if you hit blockers or need clarification.
